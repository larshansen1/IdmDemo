map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name auth.idp.madmetal.org mcp.idp.madmetal.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.idp.madmetal.org;

    ssl_certificate /etc/letsencrypt/live/auth.idp.madmetal.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.idp.madmetal.org/privkey.pem;

    # The application validates registered certificate thumbprints. optional_no_ca
    # allows demo/self-issued client certificates to reach the token endpoint.
    ssl_verify_client optional_no_ca;
    ssl_client_certificate /etc/ssl/certs/ca-certificates.crt;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Api-Key "";
    proxy_set_header Authorization "";
    proxy_set_header X-Client-Cert "";

    location = /.well-known/openid-configuration {
        proxy_pass http://127.0.0.1:5000;
    }

    location = /.well-known/jwks.json {
        proxy_pass http://127.0.0.1:5000;
    }

    location = /connect/token {
        proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        proxy_pass http://127.0.0.1:5000;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.idp.madmetal.org;

    ssl_certificate /etc/letsencrypt/live/mcp.idp.madmetal.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.idp.madmetal.org/privkey.pem;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Api-Key "";
    proxy_set_header X-Client-Cert "";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /mcp {
        proxy_pass http://127.0.0.1:5100;
    }

    location = /health/live {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5100;
    }

    location = /health/ready {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5100;
    }

    # Phase 7 will route protected resource metadata here once implemented.
    location = /.well-known/oauth-protected-resource {
        return 404;
    }

    location / {
        return 404;
    }
}
