version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "dotnet-ef"
      extensions:
        patterns:
          - "Microsoft.Extensions.*"
      identity:
        patterns:
          - "Microsoft.IdentityModel.*"
      test-tooling:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "xunit*"
      mcp:
        patterns:
          - "ModelContextProtocol*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "docker/*"
          - "actions/*"
