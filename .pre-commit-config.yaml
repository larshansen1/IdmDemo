repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: dotnet-format
        name: Check .NET code formatting
        entry: dotnet format --verify-no-changes
        language: system
        files: \.(cs|csproj|sln)$
        pass_filenames: false

      - id: dotnet-build
        name: Build .NET solution
        entry: dotnet build --no-incremental -warnaserror
        language: system
        pass_filenames: false

      - id: dotnet-test-coverage
        name: Run tests with coverage gate (80%)
        entry: >-
          dotnet test
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=80
          /p:ThresholdType=line
          /p:ThresholdStat=Total
        language: system
        pass_filenames: false

      - id: dotnet-vulnerabilities
        name: Check for vulnerable NuGet packages
        entry: bash scripts/check-vulnerabilities.sh
        language: system
        pass_filenames: false
