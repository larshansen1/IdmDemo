services:
  volume-permissions:
    image: busybox:1.36
    restart: "no"
    command: ["sh", "-c", "mkdir -p /data /keys && chown -R 1654:1654 /data /keys"]
    volumes:
      - idmdemo-data:/data
      - idmdemo-keys:/keys

  mcp-cert-gen:
    image: alpine:3
    restart: "no"
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        if [ -f /keys/mcp-client.pem ]; then
          echo "MCP client certificate already exists, skipping."
          exit 0
        fi
        apk add --no-cache --quiet openssl
        openssl req -x509 -newkey rsa:2048 \
          -keyout /tmp/mcp-key.pem \
          -out /tmp/mcp-cert.pem \
          -days 3650 -nodes \
          -subj "/CN=idm-mcp-backend"
        cat /tmp/mcp-cert.pem /tmp/mcp-key.pem > /keys/mcp-client.pem
        echo "MCP client certificate generated."
    volumes:
      - idmdemo-keys:/keys

  backend-api:
    image: ${BACKEND_API_IMAGE:?Set BACKEND_API_IMAGE}
    restart: unless-stopped
    depends_on:
      mcp-cert-gen:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/data/idm-demo.db
      AuthorizationServer__Issuer: https://auth.idp.madmetal.org
      AuthorizationServer__Audience: ${API_AUDIENCE:-idm-demo-api}
      AuthorizationServer__McpAudience: ${MCP_AUDIENCE:-idm-demo-mcp}
      AuthorizationServer__SigningKeyPath: /keys/signing-key.json
      AuthorizationServer__EnableForwardedClientCertificate: "true"
      AuthorizationServer__ForwardedClientCertificateHeader: X-Client-Cert
      CertificateAuthority__KeyPath: /keys/certificate-authority.json
      ScimAdmin__SeedClientId: ${IDM_MCP_CLIENT_ID:-idm-mcp-backend}
      ScimAdmin__SeedCertPath: /keys/mcp-client.pem
    ports:
      - "127.0.0.1:5000:8080"
    volumes:
      - idmdemo-data:/data
      - idmdemo-keys:/keys
    networks:
      - idmdemo

  backend-mcp:
    image: ${BACKEND_MCP_IMAGE:?Set BACKEND_MCP_IMAGE}
    restart: unless-stopped
    depends_on:
      mcp-cert-gen:
        condition: service_completed_successfully
      backend-api:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AuthorizationServer__Issuer: https://auth.idp.madmetal.org
      AuthorizationServer__SigningKeyPath: /keys/signing-key.json
      IdmApiInstances__local__BaseUrl: http://backend-api:8080
      IdmApiInstances__local__ClientId: ${IDM_MCP_CLIENT_ID:-idm-mcp-backend}
      IdmApiInstances__local__ClientCertificatePath: /keys/mcp-client.pem
      Mcp__DefaultInstance: local
      Mcp__Profile: HostedProduction
      Mcp__Hosted__Audience: ${MCP_AUDIENCE:-idm-demo-mcp}
      Mcp__ReadOnly: ${MCP_READ_ONLY:-true}
    ports:
      - "127.0.0.1:5100:8080"
    volumes:
      - idmdemo-keys:/keys:ro
    networks:
      - idmdemo

networks:
  idmdemo:
    driver: bridge

volumes:
  idmdemo-data:
  idmdemo-keys:
