name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Cache .NET local tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-${{ hashFiles('.config/dotnet-tools.json') }}

      - name: Cache gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-8.21.2-linux-x64

      - name: Install gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Restore .NET local tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (with analyzers)
        run: dotnet build --no-restore -warnaserror /p:RunAnalyzers=true

      - name: Lint (formatting check)
        run: dotnet format --no-restore --verify-no-changes

      - name: Test with coverage
        run: |
          dotnet test --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutput=./coverage/ \
            /p:CoverletOutputFormat=cobertura \
            /p:Exclude="[Backend.Infrastructure]*%2c[Backend.Mcp]Program*" \
            /p:Threshold=80 \
            /p:ThresholdType=line \
            /p:ThresholdStat=Total

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: "**/coverage/coverage.cobertura.xml"

      - name: Secret / credential scan
        run: bash scripts/check-secrets.sh

      - name: Vulnerability check
        run: bash scripts/check-vulnerabilities.sh

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python (for lizard)
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-lizard

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-jscpd-4.2.5

      - name: Install external tools
        run: |
          pip install lizard
          npm install -g jscpd@4.2.5

      - name: Complexity check
        run: bash scripts/check-complexity.sh 10

      - name: Duplicate code check
        run: bash scripts/check-duplicates.sh 5

  deploy-production:
    name: Deploy Production
    runs-on: [self-hosted, workhorse-idmdemo]
    needs: [build-and-test, static-analysis]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      BACKEND_API_IMAGE: ghcr.io/larshansen1/idmdemo-backend-api
      BACKEND_MCP_IMAGE: ghcr.io/larshansen1/idmdemo-backend-mcp

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for source changes
        id: changes
        run: |
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "src-changed=true"    >> $GITHUB_OUTPUT
            echo "deploy-changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1)
            if echo "$CHANGED" | grep -qE '^(src/|Directory\.Build\.props$|global\.json$)'; then
              echo "src-changed=true" >> $GITHUB_OUTPUT
            else
              echo "src-changed=false" >> $GITHUB_OUTPUT
              echo "No source changes — skipping container build."
            fi
            if echo "$CHANGED" | grep -qE '^(src/|Directory\.Build\.props$|global\.json$|deploy/production/)'; then
              echo "deploy-changed=true" >> $GITHUB_OUTPUT
            else
              echo "deploy-changed=false" >> $GITHUB_OUTPUT
              echo "No source or deploy changes — skipping deployment."
            fi
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.src-changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.changes.outputs.src-changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend.Api image
        if: steps.changes.outputs.src-changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Backend.Api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_API_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_API_IMAGE }}:main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Backend.Mcp image
        if: steps.changes.outputs.src-changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Backend.Mcp/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_MCP_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_MCP_IMAGE }}:main
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        if: steps.changes.outputs.src-changed == 'true'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Update production deployment files
        if: steps.changes.outputs.deploy-changed == 'true'
        run: |
          install -m 644 deploy/production/compose.yml /home/admin/docker/idmdemo/compose.yml
          install -m 755 deploy/production/deploy.sh /home/admin/docker/idmdemo/deploy.sh

      - name: Deploy
        if: steps.changes.outputs.deploy-changed == 'true'
        run: /home/admin/docker/idmdemo/deploy.sh '${{ github.sha }}'

      - name: Run remote MCP production smoke
        if: steps.changes.outputs.deploy-changed == 'true'
        env:
          SMOKE_CLIENT_ID: idm-mcp-smoke
          SMOKE_CERT_PATH: ${{ runner.temp }}/idmdemo-prod-mcp-smoke-client.pem
          SMOKE_CERT_PEM: ${{ secrets.MCP_PRODUCTION_SMOKE_CLIENT_CERT_PEM }}
          MCP_REMOTE_SCOPE: idm.mcp.read
          AUTH_BASE_URL: https://auth.idp.madmetal.org
          AUTH_DPOP_BASE_URL: https://auth.idp.madmetal.org
          MCP_BASE_URL: https://mcp.idp.madmetal.org
          MCP_AUDIENCE: idm-demo-mcp
        run: |
          if [ -z "$SMOKE_CERT_PEM" ]; then
            echo "MCP_PRODUCTION_SMOKE_CLIENT_CERT_PEM secret is required for production MCP smoke." >&2
            echo "Bootstrap the persistent low-privilege smoke client before deploying." >&2
            exit 1
          fi

          umask 077
          printf '%s\n' "$SMOKE_CERT_PEM" > "$SMOKE_CERT_PATH"
          trap 'rm -f "$SMOKE_CERT_PATH"' EXIT

          bash scripts/demo-mcp-remote-production-smoke.sh -v
