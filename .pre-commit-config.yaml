repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config", ".gitleaks.toml"]

  - repo: local
    hooks:
      - id: dotnet-format
        name: Check .NET code formatting
        entry: dotnet format --verify-no-changes
        language: system
        files: \.(cs|csproj|sln)$
        pass_filenames: false

      - id: dotnet-build
        name: Build .NET solution
        entry: dotnet build --no-incremental -warnaserror
        language: system
        pass_filenames: false

      - id: dotnet-test-coverage-changed
        name: Coverage gate for changed assemblies (unit tests only)
        entry: bash scripts/check-coverage-changed.sh
        language: system
        files: \.cs$
        pass_filenames: false

      - id: dotnet-vulnerabilities
        name: Check for vulnerable NuGet packages
        entry: bash scripts/check-vulnerabilities.sh
        language: system
        pass_filenames: false
