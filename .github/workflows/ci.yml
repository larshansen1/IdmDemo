name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.x"

      - name: Set up Python (for lizard)
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Node (for jscpd)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install external tools
        run: |
          pip install lizard
          npm install -g jscpd
          # Install gitleaks
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Restore .NET local tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (with analyzers)
        run: dotnet build --no-restore --no-incremental -warnaserror /p:RunAnalyzers=true

      - name: Lint (formatting check)
        run: dotnet format --no-restore --verify-no-changes

      - name: Test with coverage
        run: |
          dotnet test --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutput=./coverage/ \
            /p:CoverletOutputFormat=cobertura \
            /p:Exclude="[Backend.Infrastructure]*%2c[Backend.Mcp]Program*" \
            /p:Threshold=80 \
            /p:ThresholdType=line \
            /p:ThresholdStat=Total

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: "**/coverage/coverage.cobertura.xml"

      - name: Complexity check
        run: bash scripts/check-complexity.sh 10

      - name: Duplicate code check
        run: bash scripts/check-duplicates.sh 5

      - name: Secret / credential scan
        run: bash scripts/check-secrets.sh

      - name: Vulnerability check
        run: bash scripts/check-vulnerabilities.sh

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      BACKEND_API_IMAGE: ghcr.io/larshansen1/idmdemo-backend-api
      BACKEND_MCP_IMAGE: ghcr.io/larshansen1/idmdemo-backend-mcp

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend.Api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Backend.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_API_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_API_IMAGE }}:main

      - name: Build and push Backend.Mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Backend.Mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_MCP_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_MCP_IMAGE }}:main

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HETZNER_PORT || 22 }}" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Hetzner
        run: |
          ssh -p "${{ secrets.HETZNER_PORT || 22 }}" \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "/opt/idmdemo/deploy.sh '${{ github.sha }}'"
